      (function () {
        const S = '[data-composition-id="scene3-yes"] ';
        const SLOT = 4;

        // BG and grid rush in immediately — this is a full scene wipe
        tl.to(S + ".s3-bg", { opacity: 1, duration: 0.25, ease: "power2.in" }, 0);
        tl.to(S + ".s3-grid", { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.1);

        // "YES." EXPLODES from center
        tl.to(S + "#s3-yes-wrap", {
          opacity: 1, scale: 1, duration: 0.55, ease: "expo.out"
        }, 0.18);

        // Micro overshoot after land
        tl.to(S + "#s3-yes-wrap", { scale: 1.04, duration: 0.18, ease: "power2.in" }, 0.73);
        tl.to(S + "#s3-yes-wrap", { scale: 1, duration: 0.22, ease: "back.out(2)" }, 0.91);

        // "Gold halo" pulse on the YES — subtle brightness ping
        tl.fromTo(S + "#s3-yes",
          { filter: "drop-shadow(0 0 40px rgba(196,150,42,0.7)) drop-shadow(0 0 80px rgba(196,150,42,0.35))" },
          { filter: "drop-shadow(0 0 80px rgba(196,150,42,1.0)) drop-shadow(0 0 140px rgba(196,150,42,0.6))",

        tl.to(S + "#s3-yes",
          { filter: "drop-shadow(0 0 40px rgba(196,150,42,0.7)) drop-shadow(0 0 80px rgba(196,150,42,0.35))",
            duration: 0.6, ease: "power2.inOut" },
          0.95
        );

        // Sub-text drifts up after YES settles
        tl.to(S + "#s3-sub", {
          opacity: 1, y: 0, duration: 0.5, ease: "power2.out"
        }, 1.55);

        tl.set({}, {}, SLOT);
        window.__timelines = window.__timelines || {};
        window.__timelines["scene3-yes"] = tl;
      })();

<template id="scene5-challenge-template">
  <div
    data-composition-id="scene5-challenge"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="4"
  >
    <!-- Scene 5: The Challenge — "GET UNCOMFORTABLE."
         High-kinetic word-slam. Each word lands like a punch.
         "GET" arrives plain; "UNCOMFORTABLE." hits in gold at massive scale.
         Sub-line "IT CAN CHANGE YOUR LIFE" follows. -->
    <div class="s5-root">
      <div class="s5-bg"></div>

      <!-- Perspective grid accent — same family as ambient-bg -->
      <div class="s5-grid"></div>

      <!-- Word-slam stack -->
      <div class="s5-words" id="s5-words">
        <span class="s5-word s5-get" id="s5-get">GET</span>
        <span class="s5-word s5-big" id="s5-uncomfortable">UNCOMFORTABLE.</span>
        <div class="s5-rule" id="s5-rule"></div>
        <span class="s5-sub" id="s5-sub">IT CAN CHANGE YOUR LIFE.</span>
      </div>
    </div>

        <style>
      @font-face { font-family: 'Cormorant Garamond'; font-style: normal; font-weight: 400; src: url('../assets/fonts/CormorantGaramond-400.woff2') format('woff2'); }
      @font-face { font-family: 'Cormorant Garamond'; font-style: italic; font-weight: 400; src: url('../assets/fonts/CormorantGaramond-400i.woff2') format('woff2'); }
      @font-face { font-family: 'Cormorant Garamond'; font-style: normal; font-weight: 600; src: url('../assets/fonts/CormorantGaramond-600.woff2') format('woff2'); }
      @font-face { font-family: 'Cormorant Garamond'; font-style: italic; font-weight: 600; src: url('../assets/fonts/CormorantGaramond-600i.woff2') format('woff2'); }
      @font-face { font-family: 'Cormorant Garamond'; font-style: normal; font-weight: 700; src: url('../assets/fonts/CormorantGaramond-700.woff2') format('woff2'); }
      @font-face { font-family: 'Playfair Display'; font-style: normal; font-weight: 400; src: url('../assets/fonts/PlayfairDisplay-400.woff2') format('woff2'); }
      @font-face { font-family: 'Playfair Display'; font-style: normal; font-weight: 700; src: url('../assets/fonts/PlayfairDisplay-700.woff2') format('woff2'); }
      @font-face { font-family: 'Cinzel'; font-style: normal; font-weight: 400; src: url('../assets/fonts/Cinzel-400.woff2') format('woff2'); }
      @font-face { font-family: 'Cinzel'; font-style: normal; font-weight: 600; src: url('../assets/fonts/Cinzel-600.woff2') format('woff2'); }
    </style>
<style>
      [data-composition-id="scene5-challenge"] {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      [data-composition-id="scene5-challenge"] .s5-root {
        position: absolute;
        inset: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      [data-composition-id="scene5-challenge"] .s5-bg {
        position: absolute;
        inset: 0;
        background: #0D0D0D;
      }
      [data-composition-id="scene5-challenge"] .s5-grid {
        position: absolute;
        inset: -60px;
        background-image:
          linear-gradient(rgba(196, 150, 42, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(196, 150, 42, 0.05) 1px, transparent 1px);
        background-size: 108px 108px;
        opacity: 0.6;
      }
      [data-composition-id="scene5-challenge"] .s5-words {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        padding: 0 72px;
        gap: 0;
      }
      [data-composition-id="scene5-challenge"] .s5-word {
        display: block;
        font-family: "Cormorant Garamond", Georgia, serif;
        font-weight: 700;
        line-height: 0.9;
        opacity: 0;
        transform: translateX(-60px) scale(0.88);
      }
      [data-composition-id="scene5-challenge"] .s5-get {
        font-size: 140px;
        letter-spacing: -0.02em;
        color: #FFFFFF;
        text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
      }
      /* "UNCOMFORTABLE." is the hero — gold, massive, fills the width */
      [data-composition-id="scene5-challenge"] .s5-big {
        font-size: 118px;
        letter-spacing: -0.03em;
        background: linear-gradient(
          180deg,
          #ffe88a 0%,
          #D4A940 25%,
          #C4962A 60%,
          #8a6018 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 24px rgba(196, 150, 42, 0.65));
        margin-top: -8px;
      }
      [data-composition-id="scene5-challenge"] .s5-rule {
        height: 1px;
        width: 0%;
        background: #C4962A;
        margin-top: 28px;
        margin-bottom: 28px;
      }
      [data-composition-id="scene5-challenge"] .s5-sub {
        font-family: "Playfair Display", Georgia, serif;
        font-weight: 700;
        font-size: 44px;
        letter-spacing: 0.06em;
        color: #FFFFFF;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
        text-transform: uppercase;
        opacity: 0;
        transform: translateY(16px);
      }
    </style>

    <script src="../assets/gsap.min.js"></script>
    <script>
      (function () {
        const S = '[data-composition-id="scene5-challenge"] ';
        const SLOT = 4;
        const tl = gsap.timeline({ paused: true });

        // "GET" — fast side-slam
        tl.to(S + "#s5-get", {
          opacity: 1, x: 0, scale: 1, duration: 0.35, ease: "expo.out"
        }, 0.2);

        // "UNCOMFORTABLE." — heavy slam, slightly delayed, scale punch
        tl.to(S + "#s5-uncomfortable", {
          opacity: 1, x: 0, scale: 1.05, duration: 0.4, ease: "expo.out"
        }, 0.52);
        // Settle back to 1.0
        tl.to(S + "#s5-uncomfortable", { scale: 1, duration: 0.22, ease: "power2.out" }, 0.92);

        // Gold rule sweeps under "UNCOMFORTABLE."
        tl.to(S + ".s5-rule", { width: "100%", duration: 0.4, ease: "power2.out" }, 1.12);

        // Sub-text drifts up after rule completes
        tl.to(S + "#s5-sub", {
          opacity: 1, y: 0, duration: 0.42, ease: "power2.out"
        }, 1.55);

        tl.set({}, {}, SLOT);
        window.__timelines = window.__timelines || {};
        window.__timelines["scene5-challenge"] = tl;
      })();
    </script>
  </div>
</template>

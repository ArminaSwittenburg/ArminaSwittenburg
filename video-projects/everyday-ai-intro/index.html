<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Everyday AI Intro — Swittenburg & Company</title>
    <style>
      @font-face { font-family: 'Cormorant Garamond'; font-style: normal; font-weight: 400; src: url('assets/fonts/CormorantGaramond-400.woff2') format('woff2'); }
      @font-face { font-family: 'Cormorant Garamond'; font-style: italic; font-weight: 400; src: url('assets/fonts/CormorantGaramond-400i.woff2') format('woff2'); }
      @font-face { font-family: 'Cormorant Garamond'; font-style: normal; font-weight: 600; src: url('assets/fonts/CormorantGaramond-600.woff2') format('woff2'); }
      @font-face { font-family: 'Cormorant Garamond'; font-style: italic; font-weight: 600; src: url('assets/fonts/CormorantGaramond-600i.woff2') format('woff2'); }
      @font-face { font-family: 'Cormorant Garamond'; font-style: normal; font-weight: 700; src: url('assets/fonts/CormorantGaramond-700.woff2') format('woff2'); }
      @font-face { font-family: 'Playfair Display'; font-style: normal; font-weight: 400; src: url('assets/fonts/PlayfairDisplay-400.woff2') format('woff2'); }
      @font-face { font-family: 'Playfair Display'; font-style: normal; font-weight: 700; src: url('assets/fonts/PlayfairDisplay-700.woff2') format('woff2'); }
      @font-face { font-family: 'Cinzel'; font-style: normal; font-weight: 400; src: url('assets/fonts/Cinzel-400.woff2') format('woff2'); }
      @font-face { font-family: 'Cinzel'; font-style: normal; font-weight: 600; src: url('assets/fonts/Cinzel-600.woff2') format('woff2'); }
    </style>
    <script src="assets/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #0D0D0D;
      }
      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
      }
      /* All 4 face wrappers share this style — sized to 1080×1920 portrait */
      .face-wrap {
        position: absolute;
        top: 0; left: 0;
        width: 1080px;
        height: 1920px;
        transform-origin: center center;
        will-change: transform, opacity;
        z-index: 1;
        opacity: 0;
      }
      .face-wrap video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform-origin: center center;
        filter: contrast(1.06) saturate(1.05) brightness(0.97);
      }
      /* Side vignette softens face edges into the dark bg */
      .face-wrap::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          ellipse at center,
          transparent 55%,
          rgba(13, 13, 13, 0.22) 78%,
          rgba(13, 13, 13, 0.62) 100%
        );
      }
      .scene-layer {
        position: absolute;
        top: 0; left: 0;
        width: 1080px;
        height: 1920px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="44.37"
      data-width="1080"
      data-height="1920"
    >
      <!-- ─── Layer 0: Ambient background — gold dark canvas, runs full video ─── -->
      <div
        class="scene-layer"
        data-composition-id="ambient-bg"
        data-composition-src="compositions/ambient-bg.html"
        data-start="0"
        data-duration="44.37"
        data-track-index="0"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- ─── Layer 1: Talking heads ─── -->

      <!-- Clip 1: Hook (0–9.37s) — "There's a lot of conversation about AI…" -->
      <div id="face-wrap-1" class="face-wrap">
        <video
          id="face-video-1"
          data-start="0"
          data-duration="9.37"
          data-track-index="1"
          src="assets/clip1.mp4"
          muted
          playsinline
        ></video>
      </div>
      <audio
        id="face-audio-1"
        data-start="0"
        data-duration="9.37"
        data-track-index="2"
        data-volume="1"
        src="assets/clip1.mp4"
      ></audio>

      <!-- Clip 2: Question (9.37–19.37s) — "Will this help my life?" -->
      <div id="face-wrap-2" class="face-wrap">
        <video
          id="face-video-2"
          data-start="9.37"
          data-duration="10"
          data-track-index="5"
          src="assets/clip2.mp4"
          muted
          playsinline
        ></video>
      </div>
      <audio
        id="face-audio-2"
        data-start="9.37"
        data-duration="10"
        data-track-index="6"
        data-volume="1"
        src="assets/clip2.mp4"
      ></audio>

      <!-- Clip 3: Answer + Quote (19.37–29.37s) — "YES. You are the first corporation you manage." -->
      <div id="face-wrap-3" class="face-wrap">
        <video
          id="face-video-3"
          data-start="19.37"
          data-duration="10"
          data-track-index="7"
          src="assets/clip3.mp4"
          muted
          playsinline
        ></video>
      </div>
      <audio
        id="face-audio-3"
        data-start="19.37"
        data-duration="10"
        data-track-index="8"
        data-volume="1"
        src="assets/clip3.mp4"
      ></audio>

      <!-- Clip 4: Challenge (29.37–37.37s) — "Get uncomfortable. It can change your life." -->
      <div id="face-wrap-4" class="face-wrap">
        <video
          id="face-video-4"
          data-start="29.37"
          data-duration="8"
          data-track-index="9"
          src="assets/clip4.mp4"
          muted
          playsinline
        ></video>
      </div>
      <audio
        id="face-audio-4"
        data-start="29.37"
        data-duration="8"
        data-track-index="10"
        data-volume="1"
        src="assets/clip4.mp4"
      ></audio>

      <!-- ─── Layer 3: Scene graphic overlays (same track, back-to-back) ─── -->

      <!-- Scene 1: Hook overlay — top rule, brand watermark, "A LOT TO BE HAD." -->
      <div
        class="scene-layer"
        data-composition-id="scene1-hook"
        data-composition-src="compositions/scene1-hook.html"
        data-start="0"
        data-duration="5.5"
        data-track-index="3"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Scene 2: Question — "WILL THIS HELP YOUR LIFE?" card drop (starts with clip2) -->
      <div
        class="scene-layer"
        data-composition-id="scene2-question"
        data-composition-src="compositions/scene2-question.html"
        data-start="9.37"
        data-duration="5"
        data-track-index="3"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Scene 3: YES. explosion (starts with clip3) -->
      <div
        class="scene-layer"
        data-composition-id="scene3-yes"
        data-composition-src="compositions/scene3-yes.html"
        data-start="19.37"
        data-duration="4"
        data-track-index="3"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Scene 4: Quote card — "You are the first corporation you manage." -->
      <div
        class="scene-layer"
        data-composition-id="scene4-quote"
        data-composition-src="compositions/scene4-quote.html"
        data-start="23.37"
        data-duration="4.5"
        data-track-index="3"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Scene 5: Challenge slam — "GET UNCOMFORTABLE. IT CAN CHANGE YOUR LIFE." (starts with clip4) -->
      <div
        class="scene-layer"
        data-composition-id="scene5-challenge"
        data-composition-src="compositions/scene5-challenge.html"
        data-start="29.37"
        data-duration="4"
        data-track-index="3"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Scene 6: CTA outro — logo + shop.swittenburg.com + Everyday AI Challenge (7s hold) -->
      <div
        class="scene-layer"
        data-composition-id="scene6-cta"
        data-composition-src="compositions/scene6-cta.html"
        data-start="37.37"
        data-duration="7"
        data-track-index="3"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- ─── Layer 4: Karaoke captions — sits above all scenes ─── -->
      <div
        class="scene-layer"
        data-composition-id="captions"
        data-composition-src="compositions/captions.html"
        data-start="0"
        data-duration="44.37"
        data-track-index="4"
        data-width="1080"
        data-height="1920"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      // ── Clip 1 (0–9.37s): Hook ──
      // Fast fade-in, Ken Burns zoom, crossfade out before clip2
      mainTl.to("#face-wrap-1", { opacity: 1, duration: 0.25, ease: "power2.out" }, 0);
      mainTl.fromTo("#face-video-1", { scale: 1.0 }, { scale: 1.025, duration: 9.37, ease: "none" }, 0);
      mainTl.to("#face-wrap-1", { opacity: 0, duration: 0.7, ease: "power2.in" }, 8.67);

      // ── Clip 2 (9.37–19.37s): Question ──
      mainTl.to("#face-wrap-2", { opacity: 1, duration: 0.5, ease: "power2.out" }, 9.37);
      mainTl.fromTo("#face-video-2", { scale: 1.0 }, { scale: 1.025, duration: 10, ease: "none" }, 9.37);
      mainTl.to("#face-wrap-2", { opacity: 0, duration: 0.7, ease: "power2.in" }, 18.67);

      // ── Clip 3 (19.37–29.37s): YES. + Quote ──
      mainTl.to("#face-wrap-3", { opacity: 1, duration: 0.5, ease: "power2.out" }, 19.37);
      mainTl.fromTo("#face-video-3", { scale: 1.0 }, { scale: 1.025, duration: 10, ease: "none" }, 19.37);
      mainTl.to("#face-wrap-3", { opacity: 0, duration: 0.7, ease: "power2.in" }, 28.67);

      // ── Clip 4 (29.37–37.37s): Challenge ──
      mainTl.to("#face-wrap-4", { opacity: 1, duration: 0.5, ease: "power2.out" }, 29.37);
      mainTl.fromTo("#face-video-4", { scale: 1.0 }, { scale: 1.025, duration: 8, ease: "none" }, 29.37);
      // Clip4 fades fully out before the CTA outro locks in at 37.37s
      mainTl.to("#face-wrap-4", { opacity: 0, duration: 0.8, ease: "power2.in" }, 36.57);

      // Pad to data-duration (Law #11 — prevents black-frame flash)
      mainTl.set({}, {}, 44.37);
      window.__timelines["main"] = mainTl;
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Everyday AI Intro — Swittenburg & Company</title>
    <style>
      @font-face { font-family: 'Cormorant Garamond'; font-style: normal; font-weight: 400; src: url('assets/fonts/CormorantGaramond-400.woff2') format('woff2'); }
      @font-face { font-family: 'Cormorant Garamond'; font-style: italic; font-weight: 400; src: url('assets/fonts/CormorantGaramond-400i.woff2') format('woff2'); }
      @font-face { font-family: 'Cormorant Garamond'; font-style: normal; font-weight: 600; src: url('assets/fonts/CormorantGaramond-600.woff2') format('woff2'); }
      @font-face { font-family: 'Cormorant Garamond'; font-style: italic; font-weight: 600; src: url('assets/fonts/CormorantGaramond-600i.woff2') format('woff2'); }
      @font-face { font-family: 'Cormorant Garamond'; font-style: normal; font-weight: 700; src: url('assets/fonts/CormorantGaramond-700.woff2') format('woff2'); }
      @font-face { font-family: 'Playfair Display'; font-style: normal; font-weight: 400; src: url('assets/fonts/PlayfairDisplay-400.woff2') format('woff2'); }
      @font-face { font-family: 'Playfair Display'; font-style: normal; font-weight: 700; src: url('assets/fonts/PlayfairDisplay-700.woff2') format('woff2'); }
      @font-face { font-family: 'Cinzel'; font-style: normal; font-weight: 400; src: url('assets/fonts/Cinzel-400.woff2') format('woff2'); }
      @font-face { font-family: 'Cinzel'; font-style: normal; font-weight: 600; src: url('assets/fonts/Cinzel-600.woff2') format('woff2'); }
    </style>
    <script src="assets/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #0D0D0D;
      }
      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
      }
      .face-wrap {
        position: absolute;
        top: 0; left: 0;
        width: 1080px;
        height: 1920px;
        transform-origin: center center;
        will-change: opacity;
        opacity: 0;
      }
      .face-wrap video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform-origin: center center;
        filter: contrast(1.06) saturate(1.05) brightness(0.97);
      }
      .face-wrap::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          ellipse at center,
          transparent 55%,
          rgba(13, 13, 13, 0.22) 78%,
          rgba(13, 13, 13, 0.62) 100%
        );
      }
      .scene-layer {
        position: absolute;
        top: 0; left: 0;
        width: 1080px;
        height: 1920px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="54.57"
      data-width="1080"
      data-height="1920"
    >
      <!-- ─── Layer 0: Ambient background ─── -->
      <div
        class="scene-layer"
        data-composition-id="ambient-bg"
        data-composition-src="compositions/ambient-bg.html"
        data-start="0"
        data-duration="54.57"
        data-track-index="0"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- ─── Layer 1: Talking heads ─── -->

      <!-- Clip 1: Hook (0–7.57s) -->
      <div id="face-wrap-1" class="face-wrap">
        <video
          id="face-video-1"
          data-start="0"
          data-duration="7.57"
          data-track-index="1"
          data-has-audio="true"
          src="assets/clip1-v5.mp4"
          playsinline
        ></video>
      </div>

      <!-- Clip 2: Question (7.57–17.57s) -->
      <div id="face-wrap-2" class="face-wrap">
        <video
          id="face-video-2"
          data-start="7.57"
          data-duration="10"
          data-track-index="5"
          data-has-audio="true"
          src="assets/clip2-v5.mp4"
          playsinline
        ></video>
      </div>

      <!-- Clip 3: Answer + Quote (17.57–27.57s) -->
      <div id="face-wrap-3" class="face-wrap">
        <video
          id="face-video-3"
          data-start="17.57"
          data-duration="10"
          data-track-index="7"
          data-has-audio="true"
          src="assets/clip3-v5.mp4"
          playsinline
        ></video>
      </div>

      <!-- Clip 4: Challenge (27.57–47.57s) -->
      <div id="face-wrap-4" class="face-wrap">
        <video
          id="face-video-4"
          data-start="27.57"
          data-duration="20"
          data-track-index="9"
          data-has-audio="true"
          src="assets/clip4-v5.mp4"
          playsinline
        ></video>
      </div>

      <!-- ─── Layer 3: Scene graphic overlays ─── -->

      <div
        class="scene-layer"
        data-composition-id="scene1-hook"
        data-composition-src="compositions/scene1-hook.html"
        data-start="0"
        data-duration="5.5"
        data-track-index="3"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        class="scene-layer"
        data-composition-id="scene2-question"
        data-composition-src="compositions/scene2-question.html"
        data-start="7.57"
        data-duration="5"
        data-track-index="3"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        class="scene-layer"
        data-composition-id="scene3-yes"
        data-composition-src="compositions/scene3-yes.html"
        data-start="17.57"
        data-duration="4"
        data-track-index="3"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        class="scene-layer"
        data-composition-id="scene4-quote"
        data-composition-src="compositions/scene4-quote.html"
        data-start="21.57"
        data-duration="4.5"
        data-track-index="3"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        class="scene-layer"
        data-composition-id="scene5-challenge"
        data-composition-src="compositions/scene5-challenge.html"
        data-start="27.57"
        data-duration="4"
        data-track-index="3"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        class="scene-layer"
        data-composition-id="scene6-cta"
        data-composition-src="compositions/scene6-cta.html"
        data-start="47.57"
        data-duration="7"
        data-track-index="3"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- ─── Layer 4: Karaoke captions ─── -->
      <div
        class="scene-layer"
        data-composition-id="captions"
        data-composition-src="compositions/captions.html"
        data-start="0"
        data-duration="54.57"
        data-track-index="4"
        data-width="1080"
        data-height="1920"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      // ── Clip 1 (0–7.57s) ──
      mainTl.to("#face-wrap-1", { opacity: 1, duration: 0.25, ease: "power2.out" }, 0);
      mainTl.fromTo("#face-video-1", { scale: 1.0 }, { scale: 1.025, duration: 7.57, ease: "none" }, 0);
      mainTl.to("#face-wrap-1", { opacity: 0, duration: 0.7, ease: "power2.in" }, 6.87);

      // ── Clip 2 (7.57–17.57s) ──
      mainTl.to("#face-wrap-2", { opacity: 1, duration: 0.5, ease: "power2.out" }, 7.57);
      mainTl.fromTo("#face-video-2", { scale: 1.0 }, { scale: 1.025, duration: 10, ease: "none" }, 7.57);
      mainTl.to("#face-wrap-2", { opacity: 0, duration: 0.7, ease: "power2.in" }, 16.87);

      // ── Clip 3 (17.57–27.57s) ──
      mainTl.to("#face-wrap-3", { opacity: 1, duration: 0.5, ease: "power2.out" }, 17.57);
      mainTl.fromTo("#face-video-3", { scale: 1.0 }, { scale: 1.025, duration: 10, ease: "none" }, 17.57);
      mainTl.to("#face-wrap-3", { opacity: 0, duration: 0.7, ease: "power2.in" }, 26.87);

      // ── Clip 4 (27.57–47.57s) ──
      mainTl.to("#face-wrap-4", { opacity: 1, duration: 0.5, ease: "power2.out" }, 27.57);
      mainTl.fromTo("#face-video-4", { scale: 1.0 }, { scale: 1.04, duration: 20, ease: "none" }, 27.57);
      mainTl.to("#face-wrap-4", { opacity: 0, duration: 0.8, ease: "power2.in" }, 46.77);

      mainTl.set({}, {}, 54.57);
      window.__timelines["main"] = mainTl;
    </script>
  </body>
</html>
